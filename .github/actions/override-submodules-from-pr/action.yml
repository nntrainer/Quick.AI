name: "Override submodules from PR title"
description: >-
  Parse the triggering pull request title for `[Depend on <name> @<pr>]`
  markers and replace matching submodules under `subprojects/<name>` with
  the tip of the referenced pull request head. Useful for running CI
  against an in-flight dependency PR without committing a submodule bump.

inputs:
  pr-title:
    description: "The pull request title to parse."
    required: true

runs:
  using: composite
  steps:
    - name: Override submodules from PR dependency markers
      shell: bash
      env:
        PR_TITLE: ${{ inputs.pr-title }}
      run: |
        set -euo pipefail

        if [[ -z "${PR_TITLE:-}" ]]; then
          echo "No PR title provided; skipping submodule overrides."
          exit 0
        fi

        # Extract every `[Depend on <name> @<pr>]` marker from the title.
        mapfile -t pairs < <(
          grep -oE '\[Depend on [A-Za-z0-9._-]+ @[0-9]+\]' <<<"$PR_TITLE" \
            | sed -E 's/^\[Depend on ([A-Za-z0-9._-]+) @([0-9]+)\]$/\1 \2/'
        )

        if [[ ${#pairs[@]} -eq 0 ]]; then
          echo "No [Depend on <name> @<pr>] markers found in PR title."
          exit 0
        fi

        for pair in "${pairs[@]}"; do
          name="${pair% *}"
          pr_num="${pair##* }"
          sub="subprojects/${name}"

          if [[ ! -e "${sub}/.git" ]]; then
            echo "::warning::Override requested for '${name}' but '${sub}' is not an initialized submodule; skipping."
            continue
          fi

          echo "::group::Override ${sub} with PR #${pr_num}"
          (
            cd "${sub}"
            git fetch --no-tags origin "pull/${pr_num}/head:pr-${pr_num}"
            git checkout "pr-${pr_num}"
            git log -1 --oneline
            git submodule update --init --recursive
          )
          echo "::endgroup::"
        done
