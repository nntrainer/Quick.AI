name: "CI - Android Build"

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build CausalLM for Android (arm64-v8a)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Export Android NDK env
        run: |
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tar wget gzip \
            pkg-config \
            build-essential \
            cmake \
            flex bison \
            python3-dev python3-numpy python3 \
            meson ninja-build \
            libflatbuffers-dev flatbuffers-compiler \
            protobuf-compiler

      - name: Install Rust (aarch64-linux-android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: rustfmt, clippy

      - name: Build CausalLM for Android
        run: |
          chmod +x build_android.sh build_tokenizer_android.sh
          ./build_android.sh
