name: "Quick.AI CodeQL config"

# Limit scanning to Quick.AI's own code. The `subprojects/` tree is a
# vendored copy of nntrainer (a separate project with its own CI) and
# contains thousands of C++/Python files that are not part of Quick.AI's
# attack surface.
paths-ignore:
  - subprojects/**
  - tokenizers-cpp-build/**
  - build/**
  - builddir/**
